[1]
name = lantern
examine = A large oil lantern. The reservoir is full of oil and the wick looks good. It just needs a flame.
pickup = true
pickupdescr =
locationdescr = A large oil lantern sits on the floor, its reservoir still full of oil.

[2]
name = oilcan
examine = A dented tin oil can, empty and rusted shut. It's completely useless.
pickup = false
pickupdescr = It's empty and worthless. Leave it.
locationdescr = An empty oil can rusts in the corner.

[3]
name = matches
examine = A box of waterproof matches. Whoever stocked this lighthouse knew what they were doing. Three left.
pickup = true
pickupdescr =
locationdescr = A small box of matches sits on the shelf.

[4]
name = mirror
examine = A large signal mirror, the kind used for maritime rescue. One side is polished to a brilliant shine. This could reflect the lantern light a very long way.
pickup = true
pickupdescr =
locationdescr = A heavy signal mirror leans against the wall, dusty but intact.

[5]
name = logbook
examine = The keeper's logbook. The last entry reads:_'23rd - Storm coming from the north. Lantern oil running very low. Must ration. Nobody has come to resupply in three weeks. Beginning to worry nobody will.'_The pages after that are blank.
pickup = false
pickupdescr = The logbook is too waterlogged to move without it falling apart.

[6]
name = door
examine = A heavy iron door, bolted from the outside. Someone locked this from out there - but who? And why?
pickup = false
pickupdescr = It's bolted to the wall. You couldn't move it if you tried.
actions = output:The door is bolted from the outside. You can't open it from here.

[7]
name = hatch
examine = A rusted floor hatch in the corner. The hinges are stiff but it looks like it could be forced open. A staircase must lead up into the tower.
pickup = false
pickupdescr = It's a hatch. Bolted to the floor.
actions = output:You grab the hatch handle and heave. The hinges shriek and the hatch swings open, revealing a staircase leading up into the tower.;exit:north;editlocation:description:You are in the base room of the lighthouse. Salt-stained walls press close. The heavy iron door to the west is still bolted shut. The hatch hangs open - stairs lead up into the tower to the north.;editobject:hatch:examine:A rusted floor hatch, now hanging open. The staircase leads up into the tower.;editobject:hatch:actions:output:The hatch is already open.

[8]
name = rope
examine = A coil of thick sailor's rope. It doesn't have any obvious use up here, but it's well made.
pickup = true
pickupdescr =
locationdescr = A coil of rope hangs on a rusted hook.

[9]
name = crate
examine = A wooden supply crate, cracked open. Most of what was inside has rotted or been taken. All that remains is some packing straw and a faint smell of old fish.
pickup = false
pickupdescr = It's a heavy crate. You've got enough to carry.

[10]
name = winch
examine = A large iron winch mounted to the wall. A frayed rope descends through a gap in the floor toward the base of the tower. If you replaced that frayed rope with a good one and ran it to the door bolt, you might be able to work the bolt from in here.
pickup = false
pickupdescr = The winch is bolted to the wall.
actions = inventorycontains:rope;output:You thread the sailor's rope through the winch and run it down through the gap in the floor. After some careful work you feel it catch on the bolt mechanism below. You crank the winch handle - there's a grinding scrape of iron - and the bolt slides open. You hear the door swing free far below.;editlocation:13:directions:west;editobject:door:examine:The iron door hangs open. Cool salt air breathes in from outside.;editobject:door:actions:output:The door is already open.;inventory:remove:rope;editobject:winch:examine:The winch is set with the rope you fed through it. The door below is open.;editobject:winch:actions:output:You have already used the winch to open the door.

[11]
name = window
examine = The window is encrusted with salt spray and grime. Through it you can see fog, and beyond the fog, the vague shape of something large moving through the water.
pickup = false
pickupdescr = You can't take the window with you.

[12]
name = lens
examine = The Fresnel lens at the heart of the lamp room. Massive, faceted glass arranged in concentric rings. In its current state it's dark and cold, but if you placed a lit lantern inside the housing and angled the mirror, the beam would be visible for miles.
pickup = false
pickupdescr = The lens is enormous and mounted on a central axis. It's not going anywhere.

[13]
name = chart
examine = A yellowed nautical chart pinned to the wall. Several shipping lanes are marked in red ink. One of them passes directly off this coastline. The course correction notes in the margin say ships pass closest at high tide.
pickup = false
pickupdescr = The chart is pinned and half-disintegrated. You couldn't move it.

[14]
name = filledflag
examine = A red distress flag, folded neatly. This could be hung from the railing as a backup signal - every little bit helps.
pickup = true
pickupdescr =
locationdescr = A folded red distress flag sits in the corner.
