[18]
description = Having entered the building, you're surprised to find it to be a complete mess. The hallways wind to the south. What the hell could have happened here?
directions = south west

[19]
description = There's a man sitting in front of you. His glasses are dark, but not as dark as his blank stare. There's an empty hat beside him.
objects = beggar
directions = south
requireditem = coins
actions = output:The man suddenly starts talking to you. 'Oh, thank you. Thanks for the money. You know, I haven't heard anybody give me money for a long time. I used to be able to make a good living back here, but since a few weeks, everything's gotten really quiet. I sure do miss the little lady that always gave me right at the break of dawn, at least I think it was the break of dawn. I can't see, you see. I wonder what happened to her.' You turn to leave the man now that he's stopped talking, thinking. 'What is going on...';editlocation:description:There's a man sitting in front of you. His glasses are dark, but not as dark as his blank stare. The hat aside him contains the coins you dropped in.;place:coins;inventory:remove:coins;editobject:coins:pickup:false;editobject:coins:pickupdescr:Stealing from a BLIND BEGGAR! Shame on you! I won't allow it!
